name: Nextcloud External Monitor

on:
  schedule:
    # 每 5 分鐘執行一次 (注意：GitHub Actions 的 cron 是 UTC 時間)
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允許手動點擊按鈕觸發測試

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
    - name: 檢出程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 執行監控腳本
      env:
        # 將 GitHub Secrets 的變數帶入環境變數中
        LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python check_status.py
